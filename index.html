<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#4f46e5" />
  <title>这个圈子 - H5</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root{
      --app-width: 1100px;

      /* 明亮毛玻璃：浅底 + 半透明面板 + 深色文字 */
      --bg0:#f8fafc;
      --bg1:#eef2ff;
      --bg2:#f5f3ff;
      --panel: rgba(255,255,255,.72);
      --panel2: rgba(255,255,255,.52);
      --stroke: rgba(2,6,23,.12);
      --stroke2: rgba(2,6,23,.08);
      --text:#0f172a;
      --muted: rgba(15,23,42,.70);
      --muted2: rgba(15,23,42,.55);
      --accent1:#4f46e5;
      --accent2:#7c3aed;
      --accent3:#ec4899;
      --good:#16a34a;
      --bad:#dc2626;
      --warn:#d97706;
      --shadow: 0 20px 60px rgba(15,23,42,.15);
      --shadow2: 0 10px 30px rgba(15,23,42,.10);
      --radius-xl: 22px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; }
    body{
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(1000px 500px at 20% -10%, rgba(236,72,153,.22), transparent 55%),
        radial-gradient(900px 500px at 85% 0%, rgba(79,70,229,.18), transparent 55%),
        linear-gradient(135deg, var(--bg0), var(--bg1) 45%, var(--bg2));
      color:var(--text);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: contain;
    }

    .shell{
      max-width: var(--app-width);
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      padding-bottom: calc(72px + var(--safe-bottom));
    }

    /* 顶部安全区容错 */
    .top-safe{
      padding-top: env(safe-area-inset-top, 0px);
    }

    /* 顶部小导航（简化版） */
    .topbar{
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 12px 16px 10px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.52));
      border-bottom: 1px solid rgba(2,6,23,.08);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .brand .dot{
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      box-shadow: 0 0 0 6px rgba(124,58,237,.18);
      flex-shrink:0;
    }
    .brand .title{
      font-weight: 800;
      letter-spacing: .02em;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .icon-btn{
      width: 38px;
      height: 38px;
      border-radius: 12px;
      position: relative;
      border: 1px solid rgba(2,6,23,.10);
      background: rgba(255,255,255,.55);
      color: rgba(15,23,42,.85);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition: transform .15s, background .2s, border-color .2s;
    }
    .icon-btn:active{ transform: scale(.97); }
    .icon-btn:hover{ background: rgba(255,255,255,.72); border-color: rgba(2,6,23,.16); }

    main{
      padding: 16px;
      padding-bottom: calc(84px + var(--safe-bottom));
    }

    .panel{ display:none; animation: fadeIn .25s ease both; }
    .panel.active{ display:block; }

    @keyframes fadeIn{
      from{ opacity:0; transform: translateY(8px); }
      to{ opacity:1; transform: translateY(0); }
    }

    /* 通用卡片 */
    .card{
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      border: 1px solid var(--stroke);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow2);
    }
    .card-pad{ padding: 16px; }

    .chip{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1;
      border: 1px solid rgba(2,6,23,.12);
      background: rgba(255,255,255,.65);
      color: rgba(15,23,42,.86);
      white-space: nowrap;
    }
    .chip.good{ border-color: rgba(34,197,94,.30); background: rgba(34,197,94,.14); color: rgba(20,83,45,.96); }
    .chip.lock{ border-color: rgba(245,158,11,.30); background: rgba(245,158,11,.14); color: rgba(146,64,14,.96); }
    .chip.badge{
      background: rgba(124,58,237,.14);
      border-color: rgba(124,58,237,.22);
      color: rgba(76,29,149,.92);
    }

    .hero{
      border-radius: 34px;
      padding: 20px 18px;
      background:
        radial-gradient(900px 240px at 20% 10%, rgba(236,72,153,.35), transparent 55%),
        radial-gradient(700px 260px at 80% 0%, rgba(99,102,241,.45), transparent 60%),
        linear-gradient(135deg, rgba(79,70,229,.95), rgba(124,58,237,.95));
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 20px 70px rgba(79,70,229,.35);
      overflow:hidden;
      position: relative;
    }
    .hero:after{
      content:"";
      position:absolute;
      inset:-80px -80px auto auto;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 55%);
      transform: rotate(10deg);
      pointer-events:none;
    }

    .hero h1{
      font-size: 22px;
      font-weight: 900;
      letter-spacing: .02em;
      margin-bottom: 6px;
    }
    .hero .sub{
      color: rgba(255,255,255,.86);
      font-size: 13px;
      margin-bottom: 14px;
    }

    .hero-row{
      display:flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .hero-info{
      flex:1;
      min-width:0;
    }
    .hero-info .k{
      font-weight: 800;
      font-size: 14px;
      display:flex;
      align-items:center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .hero-info .v{
      color: rgba(255,255,255,.85);
      font-size: 12px;
    }

    .cta{
      border: 0;
      cursor:pointer;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      color: #2e1065;
      font-weight: 900;
      font-size: 13px;
      box-shadow: 0 14px 30px rgba(0,0,0,.25);
      transition: transform .15s, filter .2s;
      white-space: nowrap;
    }
    .cta:active{ transform: scale(.98); }
    .cta:hover{ filter: brightness(1.03); }

    .section-title{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 12px;
    }
    .section-title h2{
      font-size: 16px;
      font-weight: 900;
      letter-spacing: .01em;
      display:flex;
      align-items:center;
      gap: 10px;
    }
    .section-title .link{
      color: var(--muted);
      font-size: 12px;
      cursor:pointer;
      user-select:none;
      white-space: nowrap;
    }

    .circle-item{
      display:flex;
      gap: 12px;
      padding: 14px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(2,6,23,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.52));
      box-shadow: 0 12px 30px rgba(15,23,42,.12);
      cursor:pointer;
      transition: transform .15s, border-color .2s, background .2s;
    }
    .circle-item:active{ transform: scale(.99); }
    .circle-item:hover{ border-color: rgba(124,58,237,.22); background: linear-gradient(180deg, rgba(255,255,255,.86), rgba(255,255,255,.58)); }

    .circle-cover{
      width: 64px;
      height: 64px;
      border-radius: 18px;
      object-fit: cover;
      flex-shrink:0;
      border: 1px solid rgba(2,6,23,.12);
      background: rgba(255,255,255,.55);
    }
    .circle-meta{
      flex:1;
      min-width:0;
    }
    .circle-top{
      display:flex;
      align-items:flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }
    .circle-name{
      font-weight: 950;
      font-size: 15px;
      letter-spacing: .01em;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .tag-row{
      display:flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .tag{
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(124,58,237,.22);
      background: rgba(124,58,237,.10);
      color: rgba(76,29,149,.92);
    }
    .desc{
      font-size: 13px;
      color: var(--muted);
      display:-webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow:hidden;
    }
    .members{
      margin-top: 10px;
      display:flex;
      align-items:center;
      gap: 8px;
      color: var(--muted2);
      font-size: 12px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
    }

    /* 圈子列表：更适合电脑端的密度与宽度 */
    .circles-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
    }

    /* 热议贴 */
    .post-item{
      padding: 14px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(2,6,23,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.52));
      box-shadow: 0 12px 30px rgba(15,23,42,.10);
      margin-bottom: 12px;
    }
    .post-head{
      display:flex;
      gap: 10px;
      align-items:center;
      margin-bottom: 10px;
    }
    .avatar{
      width: 34px;
      height: 34px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid rgba(2,6,23,.12);
      background: rgba(255,255,255,.55);
    }
    .author{
      font-weight: 900;
      font-size: 13px;
      margin-bottom: 2px;
    }
    .post-sub{
      font-size: 12px;
      color: var(--muted2);
    }
    .post-content{
      font-size: 14px;
      color: rgba(15,23,42,.90);
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .post-actions{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(2,6,23,.08);
      color: rgba(15,23,42,.60);
    }
    .action-btn{
      flex:1;
      border: 0;
      background: transparent;
      color: inherit;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content: center;
      gap: 8px;
      padding: 8px 6px;
      border-radius: 12px;
      transition: background .2s, color .2s, transform .15s;
      font-weight: 800;
      font-size: 12px;
    }
    .action-btn:active{ transform: scale(.99); }
    .action-btn:hover{ background: rgba(2,6,23,.06); }

    .action-btn.heart:hover{ color: #fb7185; }
    .action-btn.comment:hover{ color: #a5b4fc; }

    /* 底部 Tab bar */
    .tab-bar{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: var(--app-width);
      max-width: calc(100vw);
      padding-bottom: var(--safe-bottom);
      z-index: 100;
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(2,6,23,.08);
    }
    .tab-bar-inner{
      display:flex;
      justify-content: space-around;
      padding: 10px 10px 12px;
    }
    .tab{
      width: 25%;
      border: 0;
      background: transparent;
      color: rgba(15,23,42,.58);
      display:flex;
      flex-direction: column;
      align-items:center;
      justify-content:center;
      gap: 6px;
      padding: 6px 4px;
      cursor:pointer;
      transition: color .2s, transform .15s;
      font-weight: 900;
    }
    .tab:active{ transform: scale(.98); }
    .tab.active{ color: rgba(167,139,250,.98); }
    .tab i{ font-size: 18px; }
    .tab span{ font-size: 11px; }

    /* 圈子详情（外部视角） */
    .circle-cover-wrap{
      position: relative;
      height: 255px;
      border-radius: 34px;
      overflow:hidden;
      border: 1px solid rgba(2,6,23,.10);
      box-shadow: 0 20px 70px rgba(15,23,42,.18);
    }
    .circle-cover-wrap img{
      width:100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.05) contrast(1.02);
    }
    .circle-cover-wrap:after{
      content:"";
      position:absolute; inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.00), rgba(255,255,255,.35) 78%),
        radial-gradient(600px 200px at 30% 0%, rgba(124,58,237,.16), transparent 60%);
    }
    .circle-back{
      position:absolute;
      top: 14px;
      left: 14px;
      z-index: 2;
      width: 40px; height: 40px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.55);
      background: rgba(255,255,255,.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      color: rgba(15,23,42,.92);
      transition: transform .15s, background .2s, border-color .2s;
    }
    .circle-back:active{ transform: scale(.98); }
    .circle-head{
      position:absolute;
      left: 16px;
      right: 16px;
      bottom: 14px;
      z-index: 2;
    }
    .circle-head h1{
      font-size: 26px;
      font-weight: 1000;
      margin-bottom: 6px;
      letter-spacing: .01em;
    }
    .circle-head p{
      color: rgba(15,23,42,.78);
      font-size: 13px;
      line-height: 1.45;
      display:-webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow:hidden;
      margin-top: 8px;
    }
    .circle-badges{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    /* 外部视角内容模块 */
    .module{
      margin-top: 18px;
    }
    .module h2{
      font-size: 16px;
      font-weight: 950;
      margin-bottom: 10px;
      display:flex;
      align-items:center;
      gap: 10px;
    }
    .module .box{
      border-radius: var(--radius-lg);
      border: 1px solid rgba(2,6,23,.10);
      background: rgba(255,255,255,.62);
      padding: 14px;
      color: rgba(15,23,42,.82);
      line-height: 1.65;
      font-size: 14px;
    }

    .preview-row{
      display:flex;
      gap: 12px;
      overflow-x:auto;
      padding-bottom: 10px;
      scroll-snap-type: x mandatory;
    }
    .preview-thumb{
      flex: 0 0 130px;
      height: 130px;
      border-radius: 18px;
      position: relative;
      overflow:hidden;
      border: 1px solid rgba(2,6,23,.12);
      scroll-snap-align: start;
      background: rgba(255,255,255,.55);
    }
    .preview-thumb img{
      width:100%; height:100%; object-fit: cover;
      filter: saturate(1.1);
    }
    .preview-thumb:after{
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.55));
      opacity: .8;
    }
    .preview-lock{
      position:absolute;
      left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      z-index: 2;
      width: 44px; height: 44px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.25);
      display:flex;
      align-items:center;
      justify-content:center;
      color: rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* 底部验证按钮 */
    .bottom-cta{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: var(--app-width);
      max-width: calc(100vw);
      z-index: 120;
      padding: 12px 16px calc(var(--safe-bottom) + 12px);
      background: linear-gradient(180deg, rgba(248,250,252,0) 0%, rgba(248,250,252,.45) 30%, rgba(248,250,252,.88) 100%);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .bottom-cta .btn{
      width: 100%;
      border: 0;
      cursor:pointer;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 14px;
      font-weight: 1000;
      color: rgba(255,255,255,.96);
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      box-shadow: 0 22px 70px rgba(124,58,237,.35);
      transition: transform .15s, filter .2s;
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
    }
    .bottom-cta .btn:active{ transform: scale(.99); }
    .bottom-cta .btn:hover{ filter: brightness(1.02); }

    /* 圈子加入后：子标签 */
    .subtabs{
      display:flex;
      gap: 12px;
      padding: 0 2px;
      margin: 14px 0;
      overflow:auto;
      scrollbar-width: none;
    }
    .subtabs::-webkit-scrollbar{ display:none; }
    .subtab{
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(2,6,23,.10);
      background: rgba(255,255,255,.55);
      color: rgba(15,23,42,.70);
      cursor:pointer;
      font-weight: 950;
      font-size: 12px;
      white-space: nowrap;
      transition: background .2s, border-color .2s, color .2s, transform .15s;
    }
    .subtab:active{ transform: scale(.99); }
    .subtab.active{
      background: rgba(124,58,237,.16);
      border-color: rgba(124,58,237,.30);
      color: rgba(76,29,149,.98);
    }

    /* Joined 私域聊天/论坛：统一消息结构 */
    .msg-list{
      display:flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 16px;
    }
    .msg-row{
      display:flex;
      gap: 10px;
      align-items:flex-end;
    }
    .msg-row.me{ justify-content:flex-end; }
    .msg-bubble{
      max-width: 76%;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid rgba(2,6,23,.10);
      background: rgba(255,255,255,.60);
      color: rgba(15,23,42,.90);
      line-height: 1.45;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .msg-row.me .msg-bubble{
      background: linear-gradient(180deg, rgba(124,58,237,.30), rgba(79,70,229,.22));
      border-color: rgba(124,58,237,.34);
      color: rgba(255,255,255,.96);
    }
    .msg-meta{
      font-size: 11px;
      color: rgba(15,23,42,.55);
      margin-top: 6px;
      text-align: left;
    }
    .msg-row.me .msg-meta{ text-align:right; }

    /* 消息面板：桌面双栏布局 */
    .messages-layout{
      display:grid;
      grid-template-columns: 320px 1fr;
      gap: 12px;
      align-items:start;
    }
    .messages-sidebar{
      position: sticky;
      top: 88px;
    }
    .messages-sidebar-list{
      display:flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }
    .msg-sidebar-item{
      display:flex;
      gap: 12px;
      padding: 12px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(2,6,23,.10);
      background: rgba(255,255,255,.65);
      cursor:pointer;
      transition: transform .15s, border-color .2s, background .2s;
    }
    .msg-sidebar-item:active{ transform: scale(.99); }
    .msg-sidebar-item:hover{ border-color: rgba(124,58,237,.22); }
    .msg-sidebar-item.active{
      border-color: rgba(124,58,237,.35);
      background: rgba(124,58,237,.08);
    }
    .msg-sidebar-thumb{
      width:56px;
      height:56px;
      border-radius:16px;
      border: 1px solid rgba(2,6,23,.12);
      background: rgba(255,255,255,.55);
      flex-shrink:0;
      object-fit: cover;
    }
    .messages-main-card{
      border-radius: var(--radius-lg);
      border: 1px solid rgba(2,6,23,.10);
      background: rgba(255,255,255,.65);
    }

    @media (max-width: 520px){
      .messages-layout{ grid-template-columns: 1fr; }
      .messages-sidebar{ position: static; top:auto; }
    }

    .composer{
      position: sticky;
      bottom: 0;
      z-index: 15;
      padding-top: 10px;
      padding-bottom: calc(var(--safe-bottom) + 12px);
      background: linear-gradient(180deg, rgba(248,250,252,0), rgba(248,250,252,.82));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(2,6,23,.08);
    }
    .composer form{
      display:flex;
      gap: 10px;
      padding: 10px 10px 0 10px;
      align-items:flex-end;
    }
    .input{
      flex:1;
      border-radius: 16px;

      align-items:center;
      justify-content:center;

      padding: 16px;

            ${announcementB ? `

                <div style="color: var(--muted); font-size: 12px; line-height:1.7; white-space: pre-wrap;">${escapeHtml(announcementB.body)}</div>
              </div>

          <div class="section-title" style="margin-top: 22px;">

    function renderCirclesPanel(){

        if (!q) return true;

      });

                  <div class="circle-name">${circle.name}</div>
                  ${joined ? (

      if (!activeChatCircleId){

                </div>

                  <div style="display:flex; align-items:center; gap:10px; min-width:0;">
                    <div style="width:40px;height:40px;border-radius:16px;border:1px solid rgba(2,6,23,.10); background: rgba(124,58,237,.10); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                      <i class="fa-solid fa-comment-dots" style="color: rgba(76,29,149,.95)"></i>

                    <div style="min-width:0;">
                      <div style="font-weight:1000; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(circle.name)}</div>

                    <div class="preview-thumb">

              </button>
            </div>
          </section>
        `;

      // 加入后视角：私域论坛 & 聊天 & 活动
      const posts = getPostsForCircle(circle.id);
      const circleEvents = getEventsForCircle(circle.id);
      const chatMsgs = state.chatByCircle[circle.id] || [];
      return `
        <section class="panel active" aria-label="私域圈子">

              <button class="icon-btn" type="button" data-action="close-circle" aria-label="返回" style="width:40px;height:40px;">
                <i class="fa-solid fa-arrow-left"></i>

              <div style="display:flex; align-items:flex-start; gap:12px;">
                <div style="width:40px;height:40px; border-radius:16px; background: rgba(124,58,237,.18); border:1px solid rgba(124,58,237,.30); display:flex; align-items:center; justify-content:center;">
                  <i class="fa-solid fa-wand-magic-sparkles" style="color: rgba(255,255,255,.95)"></i>
                </div>
                <div>
                  <div style="font-weight:1000; margin-bottom:6px;">欢迎来到 ${circle.name}！</div>
                  <div style="color: var(--muted); font-size:13px; line-height:1.55;">
                    这里都是验证通过的同好，尽情交流吧。
                  </div>
                </div>
              </div>
            </div>

            <div class="subtabs" role="tablist" aria-label="圈子子模块">
              <button class="subtab ${state.circleSubTab === 'forum' ? 'active' : ''}" data-action="switch-circle-subtab" data-subtab="forum">
                <i class="fa-regular fa-comments" style="margin-right:8px;"></i> 圈子论坛
              </button>
              <button class="subtab ${state.circleSubTab === 'chat' ? 'active' : ''}" data-action="switch-circle-subtab" data-subtab="chat">

                <span style="margin-left:8px; font-size:10px; background: rgba(239,68,68,.16); border:1px solid rgba(239,68,68,.28); padding:2px 8px; border-radius:999px; color: rgba(254,202,202,.95);">99+</span>
              </button>
              <button class="subtab ${state.circleSubTab === 'events' ? 'active' : ''}" data-action="switch-circle-subtab" data-subtab="events">

            ${state.circleSubTab === 'forum' ? `
              ${posts.length ? `
                <div style="display:flex; flex-direction:column; gap:12px;">
                  ${posts.map(post => {
                    const likes = getEffectivePostLikes(post);
                    const comments = getEffectivePostComments(post);
                    const liked = isPostLiked(post.id);
                    const avatarHtml = post.avatar
                      ? `<img class="avatar" src="${post.avatar}" alt="avatar" loading="eager" />`
                      : `<div class="avatar" style="display:flex;align-items:center;justify-content:center; color: rgba(15,23,42,.55); background: rgba(255,255,255,.65);">◎</div>`;
                    return `
                      <article class="post-item">
                        <div class="post-head">
                          ${avatarHtml}
                          <div>
                            <div class="author">${post.author}</div>
                            <div class="post-sub">${post.time}</div>
                          </div>
                        </div>
                        <div class="post-content">${post.content}</div>
                        <div class="post-actions">
                          <button class="action-btn" data-action="circle-post-share" data-post-id="${post.id}">
                            <i class="fa-solid fa-share-nodes"></i> 转发
                          </button>
                          <button class="action-btn comment" data-action="circle-post-comment" data-post-id="${post.id}">
                            <i class="fa-regular fa-message"></i> ${comments}
                          </button>
                          <button class="action-btn heart" data-action="circle-post-like" data-post-id="${post.id}">
                            <i class="fa-solid fa-heart" style="color:${liked ? '#fb7185' : 'inherit'}"></i> ${likes}
                          </button>
                        </div>
                      </article>
                    `;
                  }).join('')}
                </div>
              ` : `
                <div class="card card-pad" style="color: var(--muted);">
                  暂时还没有帖子。点击下方“发帖”试试吧（发布内容会保存到本地）。
                </div>
              `}

              <div style="height: 20px;"></div>
              <div class="card card-pad" style="border-radius: 18px; padding: 14px; display:flex; align-items:center; justify-content:space-between; gap: 12px; background: rgba(255,255,255,.06);">
                <div style="display:flex; align-items:center; gap:10px;">
                  <i class="fa-solid fa-pen-nib" style="font-size:20px; color: rgba(167,139,250,.98);"></i>
                  <div>
                    <div style="font-weight:1000; font-size:13px;">发帖</div>
                    <div style="color: var(--muted); font-size:12px; margin-top:4px;">发布内容会保存到本地浏览器，并在本圈子里展示。</div>
                  </div>
                </div>
                <button class="cta" type="button" data-action="fab-create-post">立即发帖</button>
              </div>
            ` : ''}

            ${state.circleSubTab === 'chat' ? `
              <div class="card card-pad" style="margin-bottom: 12px;">
                <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
                  <div style="display:flex; align-items:center; gap:10px;">
                    <i class="fa-solid fa-comment-dots" style="color: rgba(167,139,250,.98); font-size:20px;"></i>
                    <div>
                      <div style="font-weight:1000; font-size:14px;">${circle.name} 聊天室</div>
                      <div style="color: var(--muted); font-size:12px; margin-top:4px;">已保存到本地浏览器</div>
                    </div>
                  </div>
                  <span class="chip badge"><i class="fa-solid fa-shield-halved"></i> 私密对话</span>
                </div>
              </div>

              <div class="msg-list">
                ${chatMsgs.map(m => {
                  const isMe = m.from === '我';
                  const avatarHtml = isMe ? '' : (m.avatar ? `<img class="avatar" src="${m.avatar}" alt="" style="width:28px;height:28px;">` : `<div class="avatar" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;color:rgba(15,23,42,.55); background: rgba(255,255,255,.65);">◎</div>`);
                  return `
                    <div class="msg-row ${isMe ? 'me' : ''}">
                      ${isMe ? '' : avatarHtml}
                      <div>
                        <div class="msg-bubble">${escapeHtml(m.text)}</div>
                        <div class="msg-meta">${m.time || ''}</div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>

              <div class="composer">
                <form data-action="send-message" data-circle-id="${circle.id}">
                  <textarea class="input" name="message" rows="1" placeholder="输入消息…"></textarea>
                  <button class="send-btn" type="submit" aria-label="发送"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
              </div>
            ` : ''}

            ${state.circleSubTab === 'events' ? `
              <div class="card card-pad" style="margin-bottom: 12px;">
                <div style="font-weight:1000; margin-bottom:8px; display:flex; align-items:center; gap:10px;">
                  <i class="fa-regular fa-calendar" style="color: rgba(217,119,6,.98)"></i> 活动组织
                </div>
                <div style="color: var(--muted); line-height:1.65; font-size:13px;">
                  点击报名/取消报名（本地演示），并在“我的活动”里查看。
                </div>
              </div>
              ${circleEvents.length ? `
                <div class="grid" style="grid-template-columns: repeat(2, minmax(0,1fr));">
                  ${circleEvents.map(e => {
                    const rsvp = isEventRsvp(e.id);
                    return `
                      <div class="card card-pad" style="border-radius: 18px; background: rgba(255,255,255,.55); border-color: ${rsvp ? 'rgba(124,58,237,.26)' : 'rgba(2,6,23,.10)'};">
                        <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:10px;">
                          <div style="min-width:0;">
                            <div style="font-weight:1000; font-size:14px; margin-bottom:6px;">${escapeHtml(e.title)}</div>
                            <div style="color: var(--muted); font-size:12px; line-height:1.6;">
                              <div>时间：${escapeHtml(e.time)}</div>
                              <div>地点：${escapeHtml(e.location)}</div>
                            </div>
                          </div>
                          <span class="chip badge" style="font-size:11px; padding:5px 9px; background: rgba(124,58,237,.12); border-color: rgba(124,58,237,.22); color: rgba(76,29,149,.92);">
                            <i class="fa-regular fa-tag" style="margin-right:6px;"></i>${escapeHtml(e.tag)}
                          </span>
                        </div>
                        <div style="margin-top:12px;">
                          <button
                            class="action-btn"
                            style="width:100%; border:1px solid rgba(2,6,23,.10); background: rgba(255,255,255,.65);"
                            data-action="event-rsvp-toggle"
                            data-event-id="${escapeHtml(e.id)}"

                            <i class="fa-solid ${rsvp ? 'fa-xmark' : 'fa-circle-check'}"></i>
                            ${rsvp ? '取消报名' : '点击报名'}

                      </div>

                  }).join('')}
                </div>

                  这里暂时没有活动。
                </div>
              `}
            ` : ''}
          </main>
        </section>
      `;

    function renderQuizModal(){
      if (!state.activeCircleId || !state.showQuiz) return '';
      const circle = getCircle(state.activeCircleId);
      if (!circle || !circle.quiz || !circle.quiz.length) return '';
      const q = circle.quiz[state.quizStep];
      return `
        <div class="modal-overlay" role="dialog" aria-modal="true" aria-label="入圈验证">
          <div class="modal">
            <div class="modal-head">
              <button class="modal-close" type="button" data-action="close-quiz" aria-label="关闭">
                <i class="fa-solid fa-xmark"></i>
              </button>
              <h3>入圈验证</h3>
              <p>完成测试即可解锁圈内专属论坛与群聊</p>
            </div>
            <div class="modal-body">
              <div class="q-progress">
                <div class="progress-pill">Question ${state.quizStep + 1}/${circle.quiz.length}</div>
                <div class="progress-dots">
                  ${circle.quiz.map((_, idx) => `<div class="dot ${idx <= state.quizStep ? 'on' : ''}"></div>`).join('')}
                </div>
              </div>
              <div class="q-text">${q.question}</div>
              <div class="opt-list">
                ${q.options.map((opt, idx) => `
                  <button class="opt" type="button" data-action="quiz-answer" data-answer-index="${idx}">
                    ${opt}
                  </button>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderCommentModal(){
      if (!state.modal || state.modal.type !== 'comment') return '';
      const post = findPostById(state.modal.postId);
      if (!post) return '';

      const postId = String(post.id);
      const likes = getEffectivePostLikes(post);
      const commentsCount = getEffectivePostComments(post);
      const comments = state.postCommentsById && state.postCommentsById[postId] ? state.postCommentsById[postId] : [];

      return `
        <div class="modal-overlay" role="dialog" aria-modal="true" aria-label="评论帖子">
          <div class="modal">
            <div class="modal-head">
              <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">
                <i class="fa-solid fa-xmark"></i>
              </button>
              <h3>评论帖子</h3>
              <p>${escapeHtml(post.author)} · 点赞 ${likes} · 评论 ${commentsCount}</p>
            </div>
            <div class="modal-body">
              <div style="display:flex; flex-direction:column; gap:10px; max-height: 220px; overflow:auto; padding-right: 2px;">
                ${comments.length ? comments.map(c => `
                  <div class="card card-pad" style="border-radius: 16px; background: rgba(255,255,255,.65); border-color: rgba(2,6,23,.10);">
                    <div style="font-weight: 1000; font-size: 13px;">${escapeHtml(c.author || '匿名')}</div>
                    <div style="color: var(--muted); font-size: 12px; margin-top: 4px;">${escapeHtml(c.time || '')}</div>
                    <div style="color: rgba(15,23,42,.88); font-size: 13px; line-height: 1.6; margin-top: 8px; white-space: pre-wrap;">
                      ${escapeHtml(c.text || '')}
                    </div>
                  </div>
                `).join('') : `
                  <div style="color: var(--muted); font-size: 13px; line-height: 1.6;">
                    暂无评论，先来抢占沙发吧。
                  </div>
                `}
              </div>

              <div style="margin-top: 14px;">
                <form data-action="submit-comment" data-post-id="${postId}">
                  <textarea class="input" name="comment" rows="3" placeholder="输入评论内容…"></textarea>
                  <div style="display:flex; gap:10px; margin-top: 14px;">
                    <button class="cta" type="button" data-action="close-modal" style="flex: 1; background: rgba(255,255,255,.78); color: rgba(15,23,42,.92); box-shadow: none;">
                      取消
                    </button>
                    <button class="cta" type="submit" style="flex: 1;">
                      发送
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderCreatePostModal(){
      if (!state.modal || state.modal.type !== 'create-post') return '';
      const circle = getCircle(state.modal.circleId);
      if (!circle) return '';

      return `
        <div class="modal-overlay" role="dialog" aria-modal="true" aria-label="发帖">
          <div class="modal">
            <div class="modal-head">
              <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">
                <i class="fa-solid fa-xmark"></i>
              </button>
              <h3>发帖</h3>
              <p>发布到：${escapeHtml(circle.name)}</p>
            </div>
            <div class="modal-body">
              <form data-action="submit-create-post" data-circle-id="${escapeHtml(circle.id)}">
                <textarea
                  class="input"
                  name="postContent"
                  rows="5"
                  placeholder="输入你的内容…（支持换行）"
                ></textarea>
                <div style="display:flex; gap:10px; margin-top: 14px;">
                  <button class="cta" type="button" data-action="close-modal" style="flex: 1; background: rgba(255,255,255,.78); color: rgba(15,23,42,.92); box-shadow: none;">
                    取消
                  </button>
                  <button class="cta" type="submit" style="flex: 1;">
                    发布
                  </button>
                </div>
              </form>
              <div style="color: var(--muted); font-size: 12px; line-height: 1.6; margin-top: 12px;">
                内容只保存在本地浏览器（演示 Web 版功能增强）。
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderNotificationsModal(){
      if (!state.modal || state.modal.type !== 'notifications') return '';

      const unread = NOTIFICATIONS.filter(n => !(state.notificationReadIds && state.notificationReadIds.has(n.id)));
      return `
        <div class="modal-overlay" role="dialog" aria-modal="true" aria-label="通知">
          <div class="modal" style="max-width: 420px;">
            <div class="modal-head">
              <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">
                <i class="fa-solid fa-xmark"></i>
              </button>
              <h3>通知中心</h3>
              <p>${unread.length ? `你有 ${unread.length} 条未读` : '全部已读'}</p>
            </div>
            <div class="modal-body">
              <div style="display:flex; gap:10px; margin-bottom: 14px;">
                <button class="cta" type="button" data-action="mark-all-notifications-read" style="flex: 1; background: rgba(79,70,229,.12); color: rgba(76,29,149,.95); box-shadow:none;">
                  全部标记为已读
                </button>
              </div>

              <div style="display:flex; flex-direction:column; gap:10px; max-height: 340px; overflow:auto; padding-right: 2px;">
                ${NOTIFICATIONS.map(n => {
                  const isRead = state.notificationReadIds && state.notificationReadIds.has(n.id);
                  return `
                    <div class="card card-pad" style="border-radius: 16px; padding: 14px; background: ${isRead ? 'rgba(255,255,255,.50)' : 'rgba(124,58,237,.10)'}; border-color: ${isRead ? 'rgba(2,6,23,.10)' : 'rgba(124,58,237,.25)'};">
                      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:10px;">
                        <div style="min-width:0;">
                          <div style="font-weight:1000; font-size: 13px; color: rgba(15,23,42,.92);">${escapeHtml(n.title)}</div>
                          <div style="color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.6; white-space: pre-wrap;">${escapeHtml(n.body)}</div>
                        </div>
                        <div style="flex-shrink:0; color: var(--muted2); font-size: 11px; text-align:right;">
                          <div>${escapeHtml(n.time || '')}</div>
                          ${isRead ? '' : `<div style="margin-top:6px; display:inline-flex; padding: 4px 8px; border-radius: 999px; background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.22); color: rgba(220,38,38,.95); font-weight:1000;">新</div>`}
                        </div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#039;');
    }

    function render(){
      const topbar = renderHeaderForMain();

      const discoverPanel = renderDiscoverPanel();
      const circlesPanel = renderCirclesPanel();
      const messagesPanel = renderMessagesPanel();
      const profilePanel = renderProfilePanel();

      const circleDetail = state.activeCircleId ? renderCircleDetail() : '';
      const showDiscover = !state.activeCircleId && state.currentTab === 'discover';
      const showCircles = !state.activeCircleId && state.currentTab === 'circles';
      const showMessages = !state.activeCircleId && state.currentTab === 'messages';
      const showProfile = !state.activeCircleId && state.currentTab === 'profile';

      // 主面板的 active 状态由 panel 结构自身控制；这里通过 panel.active 做最终展示
      // 由于 renderDiscoverPanel 返回的是 panel.active，下面做兼容处理：只拼入当前需要的面板。
      let mainPanels = '';
      if (showDiscover) mainPanels += discoverPanel;
      if (showCircles) mainPanels += circlesPanel;
      if (showMessages) mainPanels += messagesPanel;
      if (showProfile) mainPanels += profilePanel;

      const quizModal = renderQuizModal();
      const commentModal = renderCommentModal();
      const createPostModal = renderCreatePostModal();
      const notificationsModal = renderNotificationsModal();
      const tabBar = renderTabBar();

      const toastHtml = state.toast ? `
        <div class="toast">
          <i class="fa-solid fa-circle-check" style="color:#34d399"></i>
          ${escapeHtml(state.toast)}
        </div>
      ` : '';

      root.innerHTML = `
        ${toastHtml}
        ${topbar}
        <main>
          ${mainPanels}
          ${circleDetail}
        </main>
        ${tabBar}
        ${quizModal}
        ${commentModal}
        ${createPostModal}
        ${notificationsModal}
      `;

      // 如果处于聊天详情，确保输入框可聚焦体验更顺畅
      // （不强制 focus，避免 iOS 频繁跳动）
    }

    // ------------------------------
    // 事件绑定（事件委托）
    // ------------------------------
    root.addEventListener('click', (e) => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      const action = el.getAttribute('data-action');

      if (action === 'switch-tab'){
        const tab = el.getAttribute('data-tab');
        state.currentTab = tab;
        // 切换主页面时，如果在消息详情，返回消息列表
        if (tab !== 'messages' && state.chatContext) state.chatContext = null;
        if (state.activeCircleId) state.activeCircleId = null;
        state.showQuiz = false;
        render();
      }

      if (action === 'open-circle'){
        const cid = el.getAttribute('data-circle-id');
        state.activeCircleId = cid;
        state.showQuiz = false;
        state.quizStep = 0;
        state.circleSubTab = 'forum';
        render();
      }

      if (action === 'close-circle'){
        state.activeCircleId = null;
        state.showQuiz = false;
        state.quizStep = 0;
        // 返回到 discover 更贴近用户预期
        if (state.currentTab !== 'discover') state.currentTab = 'discover';
        render();
      }

      if (action === 'close-quiz'){
        state.showQuiz = false;
        state.quizStep = 0;
        render();
      }

      if (action === 'verify-join'){
        const cid = el.getAttribute('data-circle-id') || state.activeCircleId;
        const circle = getCircle(cid);
        if (!circle) return;
        if (!circle.quiz || !circle.quiz.length){
          handleJoinCircle(cid);
          return;
        }
        state.activeCircleId = cid;
        state.quizStep = 0;
        state.showQuiz = true;
        render();
      }

      if (action === 'quiz-answer'){
        const idx = parseInt(el.getAttribute('data-answer-index'), 10);
        const circle = getCircle(state.activeCircleId);
        if (!circle || !circle.quiz) return;
        const q = circle.quiz[state.quizStep];
        if (!q) return;
        if (idx === q.answer){
          nextQuizOrJoin();
        } else {
          showToast('答案不太对哦，再想想？');
        }
        render();
      }

      if (action === 'switch-circle-subtab'){
        const subtab = el.getAttribute('data-subtab');
        state.circleSubTab = subtab;
        render();
      }

      if (action === 'open-guideline'){
        showToast('轻门槛验证：回答问答题即可加入私域');
      }

      if (action === 'search-demo'){
        showToast('搜索演示：当前版本未接入接口');
      }

      if (action === 'close-modal'){
        state.modal = null;
        state.modalDraftText = '';
        render();
      }

      if (action === 'open-notifications'){
        state.modal = { type: 'notifications' };
        render();
      }

      if (action === 'mark-all-notifications-read'){
        markAllNotificationsRead();
      }

      if (action === 'clear-message-search'){
        const cid = state.chatContext && state.chatContext.circleId ? String(state.chatContext.circleId) : null;
        if (!cid) return;
        if (!state.messageSearchByCircleId) state.messageSearchByCircleId = {};
        state.messageSearchByCircleId[cid] = '';
        persistState();
        render();
      }

      if (action === 'quick-reply'){
        const text = el.getAttribute('data-text') || '';
        const textarea = root.querySelector('form[data-action="send-message"] textarea[name="message"]');
        if (textarea){
          if (textarea.value && textarea.value.trim().length){
            textarea.value = textarea.value + ' ' + text;
          }else{
            textarea.value = text;
          }
          textarea.focus();
        }
      }

      if (action === 'post-like' || action === 'circle-post-like'){
        const pid = el.getAttribute('data-post-id');
        const post = findPostById(pid);
        if (!post) return;

        const postId = String(post.id);
        const liked = isPostLiked(postId);
        if (liked){
          state.postLiked.delete(postId);
          const currentLikes = getEffectivePostLikes(post);
          const nextLikes = Math.max(0, currentLikes - 1);
          if (!state.postOverrides[postId]) state.postOverrides[postId] = {};
          state.postOverrides[postId].likes = nextLikes;
          showToast('已取消点赞');
        }else{
          state.postLiked.add(postId);
          const currentLikes = getEffectivePostLikes(post);
          const nextLikes = currentLikes + 1;
          if (!state.postOverrides[postId]) state.postOverrides[postId] = {};
          state.postOverrides[postId].likes = nextLikes;
          showToast('点赞成功');
        }
        persistState();
        render();
      }

      if (action === 'post-comment' || action === 'circle-post-comment'){
        const pid = el.getAttribute('data-post-id');
        if (!pid) return;
        state.modal = { type: 'comment', postId: String(pid) };
        state.modalDraftText = '';
        render();
      }

      if (action === 'post-share' || action === 'circle-post-share'){
        const pid = el.getAttribute('data-post-id');
        if (!pid) return;
        const url = (location.href || '').split('#')[0] + '#post-' + encodeURIComponent(String(pid));
        const doToast = () => showToast('分享链接已复制');
        if (navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(url).then(doToast).catch(() => showToast('复制失败，请手动复制地址栏链接'));
        }else{
          showToast('当前浏览器不支持剪贴板复制，请手动复制地址栏链接');
        }
      }

      if (action === 'fab-create-post'){
        if (!state.activeCircleId) return;
        state.modal = { type: 'create-post', circleId: String(state.activeCircleId) };
        state.modalDraftText = '';
        render();
      }

      if (action === 'quick-create-post'){
        const joined = [...state.joinedCircles];
        if (!joined.length){
          showToast('先加入一个圈子，再发帖');
          return;
        }
        state.modal = { type: 'create-post', circleId: String(joined[0]) };
        state.modalDraftText = '';
        render();
      }

      if (action === 'event-rsvp-toggle'){
        const eid = el.getAttribute('data-event-id');
        if (!eid) return;
        toggleEventRsvp(eid);
      }

      if (action === 'event-demo'){
        showToast('活动详情（演示）');
      }

      if (action === 'open-chat'){
        const cid = el.getAttribute('data-circle-id');
        state.chatContext = { circleId: cid };
        // 保证在 messages tab 展示
        state.currentTab = 'messages';
        render();
      }

      if (action === 'back-to-message-list'){
        state.chatContext = null;
        render();
      }

      if (action === 'leave-circle'){
        const cid = el.getAttribute('data-circle-id');
        state.joinedCircles.delete(cid);
        // 如果正在这个圈子的详情里，直接退出圈子详情
        if (state.activeCircleId === cid) state.activeCircleId = null;
        // 清理消息详情
        if (state.chatContext && state.chatContext.circleId === cid) state.chatContext = null;
        showToast('已退出圈子（演示）');
        persistState();
        render();
      }
    });

    // 监听输入（搜索圈子）
    root.addEventListener('input', (e) => {
      const target = e.target;
      if (!target || !target.matches) return;
      if (target.matches('input[data-role="circle-search"]')){
        state.circleSearchQuery = target.value || '';
        render();
        return;
      }
      if (target.matches('input[data-role="message-search"]')){
        const cid = state.chatContext && state.chatContext.circleId ? String(state.chatContext.circleId) : null;
        if (!cid) return;
        if (!state.messageSearchByCircleId) state.messageSearchByCircleId = {};
        state.messageSearchByCircleId[cid] = target.value || '';
        render();
      }
    });

    // 监听消息发送（submit）
    root.addEventListener('submit', (e) => {
      const anyForm = e.target.closest('form');
      if (!anyForm) return;

      const sendForm = e.target.closest('form[data-action="send-message"]');
      if (sendForm){
        e.preventDefault();

        const cid = sendForm.getAttribute('data-circle-id');
        const input = sendForm.querySelector('textarea[name="message"]');
        if (!input) return;
        const text = (input.value || '').trim();
        if (!text){
          showToast('先写点什么吧');
          return;
        }
        input.value = '';

        if (!state.chatByCircle[cid]) state.chatByCircle[cid] = [];
        const now = new Date();
        const time = (now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0'));
        state.chatByCircle[cid].push({
          id: 'me-' + Math.random().toString(16).slice(2),
          from: '我',
          avatar: null,
          text: text,
          time
        });
        showToast('消息已发送（已保存本地）');
        persistState();
        render();

        // 滚动到底部：简单处理（不依赖复杂布局）
        setTimeout(() => {
          window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }, 30);
        return;
      }

      const commentForm = e.target.closest('form[data-action="submit-comment"]');
      if (commentForm){
        e.preventDefault();
        const pid = commentForm.getAttribute('data-post-id');
        const textarea = commentForm.querySelector('textarea[name="comment"]');
        if (!pid || !textarea) return;
        const text = (textarea.value || '').trim();
        if (!text){
          showToast('先写点评论内容');
          return;
        }
        textarea.value = '';

        const now = new Date();
        const time = (now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0'));
        if (!state.postCommentsById[pid]) state.postCommentsById[pid] = [];
        state.postCommentsById[pid].push({
          id: 'c-' + Math.random().toString(16).slice(2),
          author: state.profile.name,
          text,
          time
        });

        const post = findPostById(pid);
        if (post){
          const current = getEffectivePostComments(post);
          if (!state.postOverrides[pid]) state.postOverrides[pid] = {};
          state.postOverrides[pid].comments = current + 1;
        }

        showToast('评论已发送（已保存本地）');
        state.modal = null;
        state.modalDraftText = '';
        persistState();
        render();
        return;
      }

      const createPostForm = e.target.closest('form[data-action="submit-create-post"]');
      if (createPostForm){
        e.preventDefault();
        const circleId = createPostForm.getAttribute('data-circle-id');
        const textarea = createPostForm.querySelector('textarea[name="postContent"]');
        if (!circleId || !textarea) return;
        const content = (textarea.value || '').trim();
        if (!content){
          showToast('先写点内容再发布');
          return;
        }
        textarea.value = '';

        const id = getNextPostId();
        const now = new Date();
        const time = '刚刚';

        const post = {
          id,
          circleId: String(circleId),
          author: state.profile.name,
          avatar: state.profile.avatar,
          content,
          likes: 0,
          comments: 0,
          time
        };

        if (!state.customPostsByCircle[post.circleId]) state.customPostsByCircle[post.circleId] = [];
        state.customPostsByCircle[post.circleId].unshift(post);

        showToast('发帖成功（已保存本地）');
        state.modal = null;
        state.modalDraftText = '';
        persistState();
        render();
        return;
      }
    });

    // ------------------------------
    // 初始化：默认展示 discover
    // ------------------------------
    // 小修：确保 activeCircleId 不为空时不渲染主底部导航（已在 renderTabBar 处理）
    state.currentTab = 'discover';
    loadPersistedState();
    render();
  </script>
</body>
</html>
